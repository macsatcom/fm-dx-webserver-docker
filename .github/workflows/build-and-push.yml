name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout dette repo
        uses: actions/checkout@v6

      - name: Hent seneste commit SHA fra officielt repo
        id: upstream
        run: |
          SHA=$(curl -s https://api.github.com/repos/NoobishSVK/fm-dx-webserver/commits/main | jq -r '.sha')
          SHORT_SHA=${SHA:0:7}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Seneste commit: $SHORT_SHA"

      - name: Tjek om vi allerede har bygget denne version
        id: check
        run: |
          CURRENT=$(cat .last-built-version 2>/dev/null || echo "none")
          echo "Sidst bygget: $CURRENT"
          if [ "$CURRENT" = "${{ steps.upstream.outputs.sha }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Log ind på GitHub Container Registry
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Byg og push Docker image
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          network: host
          tags: |
            ghcr.io/${{ github.repository_owner }}/fm-dx-webserver:latest
            ghcr.io/${{ github.repository_owner }}/fm-dx-webserver:${{ steps.upstream.outputs.short_sha }}

      - name: Gem seneste byggede version
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "${{ steps.upstream.outputs.sha }}" > .last-built-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-built-version
          git commit -m "chore: built commit ${{ steps.upstream.outputs.short_sha }}"
          git pull --rebase origin master
          git push
